services:

  # ── Base de datos ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ventasflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # NO exponer el puerto al exterior en producción

  # ── API (NestJS) ───────────────────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/OWNER/ventasflow-backend:latest}
    container_name: ventasflow-backend
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    # NO exponer el puerto al exterior; nginx hace el proxy internamente

  # ── Frontend (Angular + Nginx) ─────────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/OWNER/ventasflow-frontend:latest}
    container_name: ventasflow-frontend
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - backend
    volumes:
      # Certs de Certbot (opcional — descomentar tras obtener SSL):
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      # - certbot-www:/var/www/certbot:ro
      # Config HTTPS (descomentar tras obtener SSL y editar el archivo):
      # - ./deploy/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      []

volumes:
  pgdata:
  # certbot-www:
