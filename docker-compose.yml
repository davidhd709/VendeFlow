services:
  postgres:
    image: postgres:16-alpine
    container_name: salesflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: salesflow
      POSTGRES_PASSWORD: salesflow
      POSTGRES_DB: salesflow
    # Host 5435 para no chocar con otros Postgres ya activos (5432/5433/5434).
    ports:
      - '5435:5432'
    volumes:
      - salesflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U salesflow -d salesflow']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  salesflow_pgdata:
