# ── HTTP (puerto 80) — usar antes de configurar HTTPS ──────────────────────
# Para HTTPS: ver deploy/nginx.ssl.conf y seguir los pasos en deploy/setup-vps.sh

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Comprimir respuestas
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/xml+rss
        image/svg+xml;

    # ── API: proxy al backend ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # CORS para cookies HttpOnly/Secure (manejado por NestJS, no aquí)
        proxy_cookie_flags ~ secure samesite=strict;
    }

    # ── Angular SPA ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache de assets estáticos ───────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Seguridad básica ────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"   always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
}
